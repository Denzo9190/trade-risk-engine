services:
  postgres:
    image: postgres:16
    container_name: traderisk-postgres
    restart: always
    environment:
      POSTGRES_DB: traderisk
      POSTGRES_USER: traderisk
      POSTGRES_PASSWORD: traderisk
      TZ: Europe/Kyiv
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: